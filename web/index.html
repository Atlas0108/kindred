<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Public Commons — local help, events, and discovery.">
  <meta name="theme-color" content="#FDF9F3">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    html { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background-color: #FDF9F3;
      -webkit-text-size-adjust: 100%;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FDF9F3;
    }
    #splash-inner {
      text-align: center;
      padding: 24px;
    }
    #splash-loader {
      width: 36px;
      height: 36px;
      margin: 0 auto;
      border: 3px solid rgba(27, 48, 34, 0.2);
      border-top-color: #1B3022;
      border-radius: 50%;
      animation: splash-spin 0.85s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
    #splash-title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-size: 34px;
      line-height: 1.12;
      color: #1B3022;
      margin: 24px 0 0;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Public Commons">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Public Commons</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="splash" role="status" aria-live="polite" aria-busy="true">
    <div id="splash-inner">
      <div id="splash-loader" aria-hidden="true"></div>
      <p id="splash-title">Public Commons</p>
      <span style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Loading</span>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('splash');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
